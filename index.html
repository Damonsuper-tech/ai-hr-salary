<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI薪酬系统</title>
</head>
<body>

  <h1>AI薪酬计算系统</h1>

  <input id="input" placeholder="输入：工资8000 奖金2000">
  <button onclick="aiCalculate()">AI计算</button>

  <h3>结果：</h3>
  <div id="output"></div>

  <script>
    async function aiCalculate() {

      const input = document.getElementById("input").value;

      const res = await fetch("/api/ai", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          text: input
        })
      });

      const data = await res.json();

      document.getElementById("output").innerText =
        data.choices[0].message.content;

    }
  </script>

</body>
</html>
